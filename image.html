   <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        /* SECTION HERO */
        .hero {
            position: relative;
            height: 50vh;
            background: url('assets/e-comerces.jpg') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 102, 255, 0.7);
        }

        .hero h1 {
            position: relative;
            z-index: 2;
            font-size: 2.5rem;
        }

        /* GALERIE */
        .gallery {
            background: #0f172a;
            padding: 60px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 15px;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Effet overlay sur image */
        .gallery-item::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 102, 255, 0.4);
            top: 0;
            left: 0;
            opacity: 0;
            transition: 0.4s;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.8rem;
            }
        }
    </style>

</head>
<body>

         } else {

           backdrop.style.pointerEvents='auto';
           document.getElementById('bar1').style.transform='rotate(40deg)';
