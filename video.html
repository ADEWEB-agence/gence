     <!-- TOPBAR -->
<div style="position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:  radial-gradient(800px 500px at 100% 10%, rgba(49,208,170,.18), transparent 55%), ;border-bottom:1px solid rgba(0,0,0,0.06);z-index:1000;">

  <div style="font-weight:600;"> </div>

  <!-- HAMBURGER -->
  <div id="hamburger"
       data-open="false"
       onclick="
         var drawer=document.getElementById('drawer');
         var backdrop=document.getElementById('backdrop');
         var open=this.getAttribute('data-open')==='true';

         if(open){
           drawer.style.right='-1000px';
           backdrop.style.opacity='0';
           backdrop.style.pointerEvents='none';
           document.getElementById('bar1').style.transform='rotate(0)';
           document.getElementById('bar1').style.top='0';
           document.getElementById('bar2').style.opacity='1';
           document.getElementById('bar3').style.transform='rotate(0)';
           document.getElementById('bar3').style.top='12px';
           this.setAttribute('data-open','false');
         } else {
           drawer.style.right='0px';
           backdrop.style.opacity='1';
           backdrop.style.pointerEvents='auto';
           document.getElementById('bar1').style.transform='rotate(40deg)';
           document.getElementById('bar1').style.top='6px';
           document.getElementById('bar2').style.opacity='0';
           document.getElementById('bar3').style.transform='rotate(-45deg)';
           document.getElementById('bar3').style.top='6px';
           this.setAttribute('data-open','true');
         }
       "
       style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(0,0,0,0.1);border-radius:8px;">
       
    <div style="width:20px;height:14px;position:relative;">
      <span id="bar1" style="position:absolute;left:0;right:0;height:2px;background:  #cbd5f5  ;top:0;transition:.3s;"></span>
      <span id="bar2" style="position:absolute;left:0;right:0;height:2px;background:  #cbd5f5;top:6px;transition:.3s;"></span>
      <span id="bar3" style="position:absolute;left:0;right:0;height:2px;background: #cbd5f5;top:12px;transition:.3s;"></span>
    </div>
  </div>
</div>

<!-- BACKDROP -->
<div id="backdrop"
     onclick="
       document.getElementById('drawer').style.right='-320px';
       this.style.opacity='0';
       this.style.pointerEvents='none';
       document.getElementById('bar1').style.transform='rotate(0)';
       document.getElementById('bar1').style.top='0';
       document.getElementById('bar2').style.opacity='1';
       document.getElementById('bar3').style.transform='rotate(0)';
       document.getElementById('bar3').style.top='12px';
       document.getElementById('hamburger').setAttribute('data-open','false');
     "
     style="position:fixed;inset:0;background:rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:.3s;z-index:998;">
</div>

<!-- DRAWER -->
<div id="drawer"
     style="position:fixed;top:0;right:-320px;width:200px;max-width:85%;height:100%;background: #0b1220  ;color:#fff;padding:20px;transition:.3s;z-index:999;display:flex;flex-direction:column;">

       document.getElementById('backdrop').style.opacity='0';
       document.getElementById('backdrop').style.pointerEvents='none';
       document.getElementById('bar1').style.transform='rotate(0)';
       document.getElementById('bar1').style.top='0';
       document.getElementById('bar2').style.opacity='1';
       document.getElementById('bar3').style.transform='rotate(0)';
       document.getElementById('bar3').style.top='12px';
       document.getElementById('hamburger').setAttribute('data-open','false');
    "
    style="background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 8px;border-radius:6px;cursor:pointer;">
      
    </button>
  </div>
